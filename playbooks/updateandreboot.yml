---
- name: Enterprise System Update and Reboot Sequence
  hosts: updateandreboot
  become: true
  
  vars:
    # A single regex string of the core application strings we care about
    target_regex: 'postgres|listen|pmon|ora_|commvault|appworx|cbagent|apache|banner|banjob|autofs|gcstartup|httpd|oracle|jenkins|mysqld|badm|oni|rabbit|tomcat'

  tasks:
    # ==========================================
    # Phase 1: Pre-Reboot State Capture
    # ==========================================
    - name: Gather initial service facts
      ansible.builtin.service_facts:

    - name: Snapshot target services that are CURRENTLY running
      ansible.builtin.set_fact:
        # 1. Convert the services dict to a list
        # 2. Keep only services where state == 'running'
        # 3. Extract just the service name (key)
        # 4. Keep only names that match our target_regex
        pre_reboot_running: >-
          {{
            ansible_facts.services | dict2items 
            | selectattr('value.state', 'equalto', 'running') 
            | map(attribute='key') 
            | select('search', target_regex) 
            | list
          }}

    - name: Display the pre-reboot snapshot
      ansible.builtin.debug:
        msg: "Found {{ pre_reboot_running | length }} critical services running."
        var: pre_reboot_running

    # ==========================================
    # Phase 2: Patch and Reboot
    # ==========================================
    - name: Apply all available DNF updates
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: Reboot the machine and wait for initialization
      ansible.builtin.reboot:
        reboot_timeout: 600
        # Allow 60 seconds of breathing room for heavy Java/Oracle apps to bind to ports
        post_reboot_delay: 60

    # ==========================================
    # Phase 3: Post-Reboot Validation
    # ==========================================
    - name: Gather post-reboot service facts
      ansible.builtin.service_facts:

    - name: Snapshot target services running AFTER reboot
      ansible.builtin.set_fact:
        post_reboot_running: >-
          {{
            ansible_facts.services | dict2items 
            | selectattr('value.state', 'equalto', 'running') 
            | map(attribute='key') 
            | select('search', target_regex) 
            | list
          }}

    - name: Calculate which services failed to recover
      ansible.builtin.set_fact:
        # The Jinja2 difference filter subtracts list B from list A
        missing_services: "{{ pre_reboot_running | difference(post_reboot_running) }}"

    - name: Assert that all previously running services have recovered
      ansible.builtin.assert:
        that:
          - missing_services | length == 0
        fail_msg: "CRITICAL PIPELINE FAILURE: The following services failed to start: {{ missing_services }}"
        success_msg: "SUCCESS: All {{ pre_reboot_running | length }} critical services recovered successfully."
